<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>معلمين الهداية – نظام المشرفات والطلاب</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:#f0f4f1;direction:rtl;}
::-webkit-scrollbar{width:0;height:0;}
input,select,textarea{font-family:'Cairo',sans-serif;}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;direction:rtl;font-family:'Cairo',sans-serif;}

/* ══ TEACHER APP ══ */

*{box-sizing:border-box;margin:0;padding:0}
:root{--g:#1a6b3c;--gl:#2d9e5f;--gp:#e8f5ee;--gold:#c9962a;--goldp:#f5e6c0;
  --r:#c0392b;--rp:#fdf0ef;--b:#1a5276;--bp:#eaf1f8;--gr:#6b7280;
  --bg:#f0f4f1;--bd:#d1e7d9;--wh:#fff;--tx:#111}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--tx);direction:rtl;min-height:100vh}
input,select,textarea,button{font-family:'Cairo',sans-serif}
::-webkit-scrollbar{width:0;height:0}

/* ─── LOGIN ─── */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--bg)}
.login-box{background:var(--wh);border-radius:20px;padding:32px 24px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.12);text-align:center}
.login-logo{font-size:52px;margin-bottom:12px}
.login-title{font-size:20px;font-weight:900;color:var(--g);margin-bottom:4px}
.login-sub{font-size:12px;color:var(--gr);margin-bottom:24px}
.login-label{font-size:12px;font-weight:700;color:var(--gr);margin-bottom:6px;text-align:right;display:block}
.login-input{width:100%;padding:12px;border:2px solid var(--bd);border-radius:10px;font-size:15px;color:var(--tx);background:var(--bg);outline:none;margin-bottom:12px;text-align:right}
.login-input:focus{border-color:var(--g)}
.login-input.pin{text-align:center;font-size:24px;letter-spacing:10px}
.login-btn{width:100%;padding:13px;background:var(--g);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:900;cursor:pointer;margin-top:4px}
.login-btn:active{background:#0f4a2a}
.login-err{color:var(--r);font-size:13px;font-weight:700;margin-bottom:10px;display:none}

/* ─── HEADER ─── */
#header{background:linear-gradient(135deg,#1a6b3c,#0d3d22);color:#fff;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 3px 12px rgba(0,0,0,.25);display:none}
.hdr-name{font-weight:900;font-size:15px}
.hdr-sub{font-size:10px;opacity:.6}
.hdr-out{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:8px;color:#fff;padding:6px 13px;font-size:12px;cursor:pointer;font-weight:700}

/* ─── TABS ─── */
#tabs{display:none;background:#155c34;overflow-x:auto;scrollbar-width:none;white-space:nowrap}
.tab{flex:0 0 auto;padding:10px 16px;color:rgba(255,255,255,.5);font-size:12px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;display:inline-block}
.tab.active{color:#fff;border-bottom-color:var(--gold)}

/* ─── MAIN ─── */
#main{display:none;padding:16px;padding-bottom:40px;max-width:640px;margin:0 auto}

/* ─── CARDS ─── */
.card{background:var(--wh);border-radius:14px;padding:14px 16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.card.green{border-right:4px solid var(--g)}
.card.gold{border-right:4px solid var(--gold);background:var(--goldp)}
.card.red{border-right:4px solid var(--r)}
.card.blue{border-right:4px solid var(--b)}
.card-title{font-size:14px;font-weight:900;margin-bottom:12px}

/* ─── FORM ELEMENTS ─── */
.fl{font-size:12px;font-weight:700;color:var(--gr);margin-bottom:5px;display:block}
.fi{width:100%;padding:10px 12px;border:2px solid var(--bd);border-radius:8px;font-size:14px;color:var(--tx);background:var(--wh);outline:none}
.fi:focus{border-color:var(--g)}
.fta{width:100%;padding:10px 12px;border:2px solid var(--bd);border-radius:8px;font-size:14px;color:var(--tx);background:var(--wh);outline:none;resize:vertical;min-height:70px}
.fg{margin-bottom:12px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.btn{display:block;width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;text-align:center}
.btn-g{background:var(--g);color:#fff}
.btn-r{background:var(--r);color:#fff}
.btn-gr{background:var(--gr);color:#fff}
.btn-wa{background:#25d366;color:#fff}
.btn-sm{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none}

/* ─── TIME BOX ─── */
.time-box{background:linear-gradient(135deg,#1a6b3c,#0d3d22);border-radius:12px;padding:14px;margin:10px 0;color:#fff}
.time-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0}
.time-row:not(:last-child){border-bottom:1px solid rgba(255,255,255,.15)}
.time-flag{font-size:11px;opacity:.7;margin-bottom:2px}
.time-val{font-size:20px;font-weight:900;font-variant-numeric:tabular-nums}
.time-label{font-size:11px;opacity:.6}

/* ─── STUDENTS LIST ─── */
.student-card{background:var(--wh);border-radius:12px;padding:12px 14px;margin-bottom:10px;border-right:4px solid var(--g);box-shadow:0 1px 6px rgba(0,0,0,.06)}
.sc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.sc-name{font-weight:900;font-size:15px}
.sc-meta{font-size:12px;color:var(--gr)}
.sc-times{background:var(--gp);border-radius:8px;padding:8px 10px;font-size:12px;margin-top:6px}
.sc-schedule{margin-top:6px}
.sc-slot{display:flex;gap:8px;align-items:center;font-size:12px;padding:4px 0;border-bottom:1px dashed var(--bd)}
.sc-slot:last-child{border-bottom:none}

/* ─── SESSIONS LOG ─── */
.sess-item{background:#f6f8fa;border-radius:10px;padding:10px 12px;margin-bottom:8px;border:1px solid #e9ecef}
.si-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.si-name{font-weight:700;font-size:14px}
.si-meta{font-size:12px;color:var(--gr)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.b-done{background:#dcfce7;color:#15803d}
.b-abs{background:#fef9c3;color:#a16207}
.b-cancel{background:#fee2e2;color:#dc2626}

/* ─── STATUS PILLS ─── */
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.pill{padding:7px 14px;border:2px solid var(--bd);border-radius:20px;background:var(--wh);cursor:pointer;font-size:12px;font-weight:700;color:var(--gr)}
.pill.p-done{background:#dcfce7;border-color:#86efac;color:#15803d}
.pill.p-abs{background:#fef9c3;border-color:#fde047;color:#a16207}
.pill.p-cancel{background:#fee2e2;border-color:#fca5a5;color:#dc2626}
.pill.p-dur{border-color:var(--g);color:var(--g);background:var(--gp)}

/* ─── TOAST ─── */
#toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--g);color:#fff;border-radius:30px;padding:10px 22px;font-weight:700;font-size:13px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.2);display:none;white-space:nowrap}

/* ─── SCHEDULE GRID ─── */
.sched-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:10px}
.sched-day{background:var(--gp);border-radius:8px;padding:6px 4px;text-align:center;font-size:10px;font-weight:700;color:var(--g)}
.sched-day-name{font-size:9px;color:var(--gr);margin-bottom:4px}
.sched-slot{background:var(--wh);border-radius:6px;padding:4px;margin-top:3px;font-size:9px;border:1px solid var(--bd);cursor:pointer}

@media(max-width:480px){.fg2{grid-template-columns:1fr}}

</style>
</head>

  {name:"South Dakota",abbr:"SD",tz:"America/Chicago"},{name:"Tennessee",abbr:"TN",tz:"America/Chicago"},
  {name:"Texas",abbr:"TX",tz:"America/Chicago"},{name:"Utah",abbr:"UT",tz:"America/Denver"},
  {name:"Vermont",abbr:"VT",tz:"America/New_York"},{name:"Virginia",abbr:"VA",tz:"America/New_York"},
  {name:"Washington",abbr:"WA",tz:"America/Los_Angeles"},{name:"Washington D.C.",abbr:"DC",tz:"America/New_York"},
  {name:"West Virginia",abbr:"WV",tz:"America/New_York"},{name:"Wisconsin",abbr:"WI",tz:"America/Chicago"},
  {name:"Wyoming",abbr:"WY",tz:"America/Denver"},
];
const DAYS_AR=["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
function getOffsetMs(date,tz){const l=new Date(date.toLocaleString("en-US",{timeZone:tz}));const u=new Date(date.toLocaleString("en-US",{timeZone:"UTC"}));return l-u;}
function egToUS(h12,min,ampm,tz){try{let h=parseInt(h12);const m=parseInt(min);if(ampm==="PM"&&h!==12)h+=12;if(ampm==="AM"&&h===12)h=0;const today=new Date().toISOString().slice(0,10);const probe=new Date(today+"T12:00:00Z");const egOff=getOffsetMs(probe,"Africa/Cairo");const naive=new Date(today+"T"+String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":00Z");const utc=new Date(naive.getTime()-egOff);return new Intl.DateTimeFormat("en-US",{timeZone:tz,hour:"2-digit",minute:"2-digit",hour12:true}).format(utc);}catch{return "—";}}

function to12Hour(time24) {
  if(!time24) return '';
  const [h,m] = time24.split(':'); if(!h||!m) return time24;
  let hh = parseInt(h); const mm = String(m).padStart(2,'0');
  const ampm = hh >= 12 ? 'PM' : 'AM';
  hh = hh % 12; if(hh === 0) hh = 12;
  return hh + ':' + mm + ' ' + ampm;
}

// ══════════════════════════════════════════════
//  EGYPT DAY HELPERS (Day runs 6 AM - 6 AM)
// ══════════════════════════════════════════════
function getEgyptTodayStr() {
  const now = new Date();
  const egStr = now.toLocaleString('en-US', { timeZone: 'Africa/Cairo' });
  const egDate = new Date(egStr);
  const h = egDate.getHours();
  if (h < 6) {
    egDate.setDate(egDate.getDate() - 1);
  }
  const y = egDate.getFullYear();
  const mo = String(egDate.getMonth() + 1).padStart(2, '0');
  const d = String(egDate.getDate()).padStart(2, '0');
  return y + '-' + mo + '-' + d;
}

function isInCurrentEgyptDay(sessionDate, startTime, baseDateStr) {
  const sessionDT = new Date(sessionDate + "T" + (startTime || "00:00") + "+02:00");
  const dayStart = new Date(baseDateStr + "T06:00:00+02:00");
  const dayEnd = new Date(dayStart.getTime() + 24 * 60 * 60 * 1000);
  return sessionDT >= dayStart && sessionDT < dayEnd;
}

function getEgyptDayName(dateStr) {
  const d = new Date(dateStr + "T12:00:00+02:00");
  return DAYS_AR[d.getDay()];
}

// ══════════════════════════════════════════════
//  AUTO SESSION GENERATION
// ══════════════════════════════════════════════
function generateAutoSessions(student, countDays) {
  countDays = countDays || 30;
  const sessions = [];
  const schedule = student.schedule || [];
  if (schedule.length === 0) return sessions;

  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  for (var d = 0; d < countDays; d++) {
    var cur = new Date(start.getTime() + d * 86400000);
    var dayIdx = cur.getDay();
    var dateStr = cur.toISOString().slice(0, 10);

    for (var i = 0; i < schedule.length; i++) {
      var sched = schedule[i];
      var schedDay = parseInt(sched.day);
      if (schedDay === dayIdx) {
        var hour = parseInt(sched.h);
        var minute = String(sched.m).padStart(2, '0');
        if (sched.ampm === 'PM' && hour !== 12) hour += 12;
        if (sched.ampm === 'AM' && hour === 12) hour = 0;
        var time24 = String(hour).padStart(2, '0') + ':' + minute;

        sessions.push({
          studentName: student.name,
          date: dateStr,
          startTime: time24,
          dur: parseFloat(student.defaultDur) || 0.75,
          type: 'regular',
          status: 'pending',
          note: student.program || '',
          createdAt: Date.now()
        });
      }
    }
  }
  return sessions;
}

// ══════════════════════════════════════════════
//  FREE SLOTS CALCULATION
// ══════════════════════════════════════════════
function calcFreeSlots(sessions, workStart, workEnd) {
  workStart = workStart || "06:00";
  workEnd = workEnd || "23:59";
  var byDate = {};
  for (var i = 0; i < sessions.length; i++) {
    var s = sessions[i];
    if (!byDate[s.date]) byDate[s.date] = [];
    byDate[s.date].push(s);
  }

  var freeSlots = [];
  var dates = Object.keys(byDate).sort();

  for (var d = 0; d < dates.length; d++) {
    var date = dates[d];
    var daySessions = byDate[date].slice().sort(function(a, b) {
      return (a.startTime || '').localeCompare(b.startTime || '');
    });

    var currentEnd = workStart;
    for (var j = 0; j < daySessions.length; j++) {
      var sess = daySessions[j];
      var sStart = sess.startTime || "00:00";
      if (sStart > currentEnd) {
        freeSlots.push({ date: date, start: currentEnd, end: sStart });
      }
      var parts = sStart.split(":");
      var sh = parseInt(parts[0]);
      var sm = parseInt(parts[1] || 0);
      var durH = parseFloat(sess.dur) || 0.75;
      var totalMin = sm + durH * 60;
      var eh = sh + Math.floor(totalMin / 60);
      var em = Math.round(totalMin % 60);
      var sEnd = String(eh).padStart(2, '0') + ':' + String(em).padStart(2, '0');
      if (sEnd > currentEnd) currentEnd = sEnd;
    }
    if (currentEnd < workEnd) {
      freeSlots.push({ date: date, start: currentEnd, end: workEnd });
    }
  }
  return freeSlots;
}

function to12h(t){if(!t)return'—';const[h,m]=t.split(':').map(Number);const ap=h>=12?'PM':'AM';return`${h%12||12}:${String(m).padStart(2,'0')} ${ap}`;}
function getStateTz(st){if(!st)return null;const found=ALL_STATES.find(s=>s.abbr===st||s.name.toLowerCase()===st.toLowerCase());return found?.tz||null;}
function egTimeToUS(time24,tz){if(!time24||!tz)return'—';const[h,m]=time24.split(':').map(Number);const ap=h>=12?'PM':'AM';return egToUS(h%12||12,String(m).padStart(2,'0'),ap,tz);}
function calcMonthlyHours(schedule,duration){return Math.round((schedule||[]).length*4*(duration||45)/60*10)/10;}
function fmtStudentTimes(schedule,state){
  const tz=getStateTz(state);
  if(!tz||!(schedule||[]).length)return'—';
  return schedule.map(sl=>`${sl.day.substring(0,3)} ${egTimeToUS(sl.time,tz)}`).join(' | ');
}

function StudentsTab({configTeachers}){
  const [students,setStudents]=useState(IST_ST);
  const teachers = useMemo(() => {
    const t = Object.entries(configTeachers || {}).map(([k,v]) => v.name || k);
    return t.length > 0 ? t : ITC_ST;
  }, [configTeachers]);
  const [search,setSearch]=useState('');
  const [fSt,setFSt]=useState('');
  const [fTch,setFTch]=useState('');
  const [editId,setEditId]=useState(null);
  const [editD,setEditD]=useState({});
  const [csvErr,setCsvErr]=useState('');
  const [csvOk,setCsvOk]=useState('');
  const [page,setPage]=useState(1);
  const fref=useRef();

  const filtered=useMemo(()=>students.filter(s=>{
    const ms=!search||s.name.toLowerCase().includes(search.toLowerCase());
    const mx=!fSt||s.status===fSt;
    const mt=!fTch||s.teacher===fTch;
    return ms&&mx&&mt;
  }),[students,search,fSt,fTch]);

  const pages=Math.max(1,Math.ceil(filtered.length/PG_ST));
  const paged=filtered.slice((page-1)*PG_ST,page*PG_ST);

  const startEdit=(s)=>{setEditId(s.id);setEditD({...s,schedule:[...(s.schedule||[])]});};
  const saveEdit=()=>{setStudents(p=>p.map(s=>s.id===editId?{...editD}:s));setEditId(null);};
  const del=(id)=>{if(window.confirm('حذف هذا الطالب؟'))setStudents(p=>p.filter(s=>s.id!==id));};

  // NEW: Auto-create sessions when saving student with a teacher
  const saveWithAutoSessions = () => {
    // Save locally
    setStudents(p=>[...p,editD]);
    // Also add to teacher's students in Firebase + auto-generate sessions
    if(editD.teacher){
      const teacherKey = Object.entries(configTeachers || {}).find(([k,v]) => v.name === editD.teacher)?.[0];
      if(teacherKey){
        // Convert schedule format for auto-generation
        const scheduleForGen = (editD.schedule||[]).map(s => ({
          day: DAYS_ST.indexOf(s.day),
          h: parseInt(s.time?.split(':')[0]) || 9,
          m: parseInt(s.time?.split(':')[1]) || 0,
          ampm: (parseInt(s.time?.split(':')[0]) || 9) >= 12 ? 'PM' : 'AM'
        }));

        const studentData = {
          name: editD.name,
          state: editD.state,
          schedule: scheduleForGen,
          program: 'قرآن كريم',
          monthlyHours: calcMonthlyHours(editD.schedule,editD.duration),
          addedAt: Date.now()
        };
        DB.push(`teachers/${teacherKey}/students`, studentData);

        // Auto-generate sessions
        const sessions = generateAutoSessions({
          ...studentData,
          defaultDur: (editD.duration || 45) / 60
        }, 30);
        for (var i = 0; i < sessions.length; i++) {
          DB.push(`teachers/${teacherKey}/sessions`, sessions[i]);
        }
      }
    }
    setEditId(null);
  };

  const handleCsv=(e)=>{
    const f=e.target.files[0];if(!f)return;
    setCsvErr('');setCsvOk('');
    const r=new FileReader();
    r.onload=(ev)=>{
      try{
        const lines=ev.target.result.trim().split('\n');
        if(lines.length<2){setCsvErr('الملف فارغ');return;}
        const add=[];
        for(let i=1;i<lines.length;i++){
          const c=lines[i].split(',').map(x=>x.trim().replace(/^"|"$/g,''));
          if(!c[0]?.trim())continue;
          const schedRaw=c[3]||'';
          const schedule=schedRaw?schedRaw.split('|').map(part=>{
            const[day,time]=part.split(';').map(x=>x.trim());
            return day&&time?{day,time}:null;
          }).filter(Boolean):[];
          const duration=parseInt(c[4])||45;
          add.push({
            id:nid_st++,
            name:c[0]||'',
            teacher:c[1]||'',
            state:c[2]||'',
            schedule,
            duration,
            phone:c[5]||'',
            status:c[6]||'نشط',
            notes:c[7]||''
          });
        }
        setStudents(p=>[...p,...add]);
        setCsvOk(`✅ تم إضافة ${add.length} طالب – توقيت الطالب محسوب أوتوماتيك`);

        // NEW: Auto-create sessions for CSV students with teachers
        for (var idx = 0; idx < add.length; idx++) {
          var stu = add[idx];
          if (stu.teacher) {
            var tKey = Object.entries(configTeachers || {}).find(function(entry) {
              return entry[1].name === stu.teacher;
            })?.[0];
            if (tKey) {
              var schedGen = (stu.schedule||[]).map(function(s) {
                return {
                  day: DAYS_ST.indexOf(s.day),
                  h: parseInt(s.time?.split(':')[0]) || 9,
                  m: parseInt(s.time?.split(':')[1]) || 0,
                  ampm: (parseInt(s.time?.split(':')[0]) || 9) >= 12 ? 'PM' : 'AM'
                };
              });
              var stuData = {
                name: stu.name,
                state: stu.state,
                schedule: schedGen,
                program: 'قرآن كريم',
                monthlyHours: calcMonthlyHours(stu.schedule, stu.duration),
                addedAt: Date.now()
              };
              DB.push(`teachers/${tKey}/students`, stuData);
              var sessList = generateAutoSessions({
                name: stu.name,
                state: stu.state,
                schedule: schedGen,
                defaultDur: (stu.duration || 45) / 60,
                program: 'قرآن كريم'
              }, 30);
              for (var si = 0; si < sessList.length; si++) {
                DB.push(`teachers/${tKey}/sessions`, sessList[si]);
              }
            }
          }
        }

function CheckTab({shift,setShift,cl}){
  const [checked,setChecked]=useState({});
  const list=cl[shift]||[];
  const done=list.filter((_,i)=>!!checked[`${shift}-${i}`]).length;
  const pct=list.length?Math.round(done/list.length*100):0;
  return(
    <div style={{padding:16}}>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        {[1,2,3].map(s=>{
          const active=shift===s;
          return(
            <button key={s} onClick={()=>setShift(s)}
              style={{flex:1,padding:'10px 4px',border:`2px solid ${active?G:BD}`,borderRadius:10,background:active?G:WH,color:active?WH:GR,fontFamily:'Cairo,sans-serif',fontSize:12,fontWeight:700,cursor:'pointer'}}>
              {s===1?'🌅 شيفت ١':s===2?'🌞 شيفت ٢':'🌙 شيفت ٣'}
            </button>
          );
        })}
      </div>
      <div style={{background:GOLDP,borderRadius:12,padding:'12px 14px',marginBottom:14,border:`1px solid #e0c870`}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
          <span style={{fontWeight:700,fontSize:12,color:'#7a5a0a'}}>تقدم الشيفت</span>
          <span style={{fontWeight:900,color:G}}>{done}/{list.length}</span>
        </div>
        <div style={{background:'rgba(0,0,0,.1)',borderRadius:99,height:8}}>
          <div style={{background:pct===100?'#27ae60':G,height:'100%',width:`${pct}%`,transition:'width .4s',borderRadius:99}}/>
        </div>
        {pct===100&&<div style={{color:'#27ae60',fontWeight:900,fontSize:13,marginTop:8,textAlign:'center'}}>🎉 أحسنتِ! اكتملت مهام الشيفت</div>}
      </div>
      <div style={{...sCard(),padding:'4px 14px'}}>
        {list.map((item,i)=>{
          const key=`${shift}-${i}`,isDone=!!checked[key];
          return(
            <div key={key} onClick={()=>setChecked(p=>({...p,[key]:!p[key]}))}
              style={{display:'flex',alignItems:'flex-start',gap:12,padding:'12px 0',borderBottom:i<list.length-1?`1px dashed ${BD}`:'none',cursor:'pointer'}}>
              <div style={{width:24,height:24,borderRadius:6,border:`2px solid ${isDone?G:BD}`,background:isDone?G:'transparent',color:WH,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0,marginTop:2}}>{isDone&&'✓'}</div>
              <span style={{fontSize:14,color:isDone?GR:TX,textDecoration:isDone?'line-through':'none',lineHeight:1.5}}>{item}</span>
            </div>
          );
        })}
      </div>
      <button onClick={()=>setChecked({})} style={{width:'100%',padding:10,background:'transparent',border:`2px dashed ${BD}`,borderRadius:8,color:GR,fontFamily:'Cairo,sans-serif',fontSize:12,cursor:'pointer',marginTop:12}}>↺ مسح وابدأ شيفت جديد</button>
    </div>
  );
}

  const savecl=async()=>{const u={...cl};u[editCl.s]=[...cl[editCl.s]];u[editCl.s][editCl.i]=eCl;await onSaveCl(u);setEditCl(null);showToast('✅ تم الحفظ!');};
  const addItem=async s=>{const u={...cl,[s]:[...cl[s],'مهمة جديدة – عدّلها']};await onSaveCl(u);showToast('✅ تمت الإضافة');};
  const delItem=async(s,i)=>{const u={...cl,[s]:cl[s].filter((_,x)=>x!==i)};await onSaveCl(u);showToast('🗑️ تم الحذف');};

  return(
    <div style={{padding:16}}>
      <Toast msg={toast}/>
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        {[{id:'msgs',l:'💬 الرسائل'},{id:'cl',l:'✅ الـ Checklist'}].map(m=>{

          );

      {mode==='msgs'&&msgs.map(m=>{
        const isEditing=editId===m.id;

          <div key={m.id} style={sCard(GOLD)}>
            {isEditing?(
              <>
                <input value={eT} onChange={e=>setET(e.target.value)} style={{...sInp,fontWeight:700,marginBottom:8}}/>
                <textarea value={eTx} onChange={e=>setETx(e.target.value)} style={{...sInp,resize:'vertical',minHeight:120,marginBottom:8}}/>
                <div style={{display:'flex',gap:8}}>
                  <button onClick={()=>setEditId(null)} style={{...sBtn(GR),flex:1}}>إلغاء</button>
                  <button onClick={savemsg} style={{...sBtn(G),flex:1}}>💾 حفظ</button>
                </div>
              </>
            ):(
              <>
                <div style={{fontWeight:900,fontSize:13,marginBottom:4}}>{m.icon} {m.title}</div>
                <div style={{fontSize:12,color:GR,marginBottom:8,maxHeight:40,overflow:'hidden'}}>{m.text.slice(0,80)}...</div>
                <button onClick={()=>{setEditId(m.id);setET(m.title);setETx(m.text);}} style={{background:GOLDP,border:`1px solid ${GOLD}`,borderRadius:8,padding:'6px 14px',fontSize:12,cursor:'pointer',color:'#7a5a0a',fontFamily:'Cairo,sans-serif',fontWeight:700}}>✏️ تعديل</button>
              </>
            )}
          </div>
        );
      })}
      {mode==='cl'&&[1,2,3].map(s=>{
        const shiftColor=s===1?GOLD:s===2?G:B;
        return (
          <div key={s} style={sCard(shiftColor)}>
            <div style={{fontWeight:900,fontSize:14,marginBottom:10}}>{s===1?'🌅':s===2?'🌞':'🌙'} شيفت {s}</div>
            {cl[s]?.map((item,i)=>{
              const isEditing=editCl?.s===s&&editCl?.i===i;
              return (
                <div key={i} style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}>
                  {isEditing?(
                    <>
                      <input value={eCl} onChange={e=>setECl(e.target.value)} style={{...sInp,flex:1}}/>
                      <button onClick={savecl} style={{...sBtn(G),padding:'8px 12px',fontSize:12,flexShrink:0}}>حفظ</button>
                      <button onClick={()=>setEditCl(null)} style={{...sBtn(GR),padding:'8px 10px',fontSize:12,flexShrink:0}}>✕</button>
                    </>
                  ):(
                    <>
                      <span style={{flex:1,fontSize:13}}>{item}</span>
                      <button onClick={()=>{setEditCl({s,i});setECl(item);}} style={{background:GOLDP,border:`1px solid ${GOLD}`,borderRadius:6,padding:'4px 8px',fontSize:11,cursor:'pointer',color:'#7a5a0a',fontFamily:'Cairo,sans-serif',flexShrink:0}}>✏️</button>
                      <button onClick={()=>delItem(s,i)} style={{background:RP,border:`1px solid ${R}`,borderRadius:6,padding:'4px 8px',fontSize:11,cursor:'pointer',color:R,fontFamily:'Cairo,sans-serif',flexShrink:0}}>✕</button>
                    </>
                  )}
                </div>
              );
            })}
            <button onClick={()=>addItem(s)} style={{...sBtn(shiftColor),width:'100%',padding:'8px',fontSize:12,marginTop:4}}>+ إضافة مهمة</button>
          </div>
        );
      })}
    </div>
  );
}

function AdminSups({sups,adminPin,supPins,onSaveSups,onSavePin,onSaveSupPins}){
  const [newPinSup,setNewPinSup]=useState('');const [newPinVal,setNewPinVal]=useState('');const [pinToast,setPinToast]=useState(false);
  const saveSupPin=async()=>{if(!newPinSup||newPinVal.length<3)return;await onSaveSupPins({...supPins,[newPinSup]:newPinVal});setNewPinSup('');setNewPinVal('');setPinToast(true);setTimeout(()=>setPinToast(false),2000);};
  const [newS,setNewS]=useState('');const [newP,setNewP]=useState('');const [ps,setPs]=useState(false);
  const add=async()=>{if(!newS.trim())return;await onSaveSups([...sups,newS.trim()]);setNewS('');};
  const del=async s=>{await onSaveSups(sups.filter(x=>x!==s));};

        <div style={{display:'flex',gap:8,marginTop:14}}>

        <div style={{fontWeight:900,fontSize:14,marginBottom:12}}>🔐 رمز دخول المدير</div>

        </div>
        <div style={{fontSize:11,color:GR,marginTop:8}}>الرمز الحالي: {adminPin}</div>
      </div>
    </div>
  );
}

//  TODAY'S SESSIONS - 6 AM to 6 AM Egypt time, 12-hour format
// ══════════════════════════════════════════════
function TodaySessionsAll({teacherData, configTeachers}){
  const egyptToday = getEgyptTodayStr();
  const [filterTeacher, setFilterTeacher] = useState('all');

  // Collect all sessions that fall within 6 AM - 6 AM Egypt day
  let allSessions = [];
  Object.entries(teacherData || {}).forEach(([teacherKey, teacher]) => {
    const teacherName = configTeachers?.[teacherKey]?.name || teacherKey;
    const sessions = teacher?.sessions || {};
    Object.entries(sessions).forEach(([sessKey, sess]) => {
      if (isInCurrentEgyptDay(sess.date, sess.startTime, egyptToday)) {
        allSessions.push({...sess, _key: sessKey, teacherKey, teacherName});
      }
    });
  });

  // Sort by date+start time
  allSessions.sort((a,b) => {
    const ta = (a.date || '') + "T" + (a.startTime || '00:00');
    const tb = (b.date || '') + "T" + (b.startTime || '00:00');
    return ta.localeCompare(tb);
  });

  // Filter by teacher if selected
  const filtered = filterTeacher === 'all'
    ? allSessions
    : allSessions.filter(s => s.teacherKey === filterTeacher);

  // Get unique teachers for filter
  const teachers = [...new Set(allSessions.map(s => s.teacherKey))].map(k => ({
    key: k,
    name: configTeachers?.[k]?.name || k
  }));

  const durL = {0.25:'15د',0.5:'30د',0.75:'45د',1:'ساعة',1.5:'ساعة ونصف'};
  const stColors = {
    present: {bg:'#dcfce7', text:'#15803d', label:'✅ Present'},
    absent_paid: {bg:'#fef9c3', text:'#a16207', label:'❌ Absent-paid'},
    absent_unpaid: {bg:'#fee2e2', text:'#dc2626', label:'🚫 Absent-not paid'},
    pending: {bg:'#e0e7ff', text:'#4338ca', label:'⏳ Pending'},
    regular: {bg:'#dcfce7', text:'#15803d', label:'📚 Regular'}
  };

  return(
    <div style={{padding:16}}>
      <div style={{fontWeight:900,fontSize:14,color:G,marginBottom:14}}>
        📅 حصص اليوم — {getEgyptDayName(egyptToday)} {egyptToday} (6:00 صباحاً → 6:00 صباحاً)
      </div>

      {/* Teacher Filter */}
      <div style={{marginBottom:14}}>
        <select
          value={filterTeacher}
          onChange={e=>setFilterTeacher(e.target.value)}
          style={{...sInp, background:WH}}
        >
          <option value="all">👨‍🏫 كل المعلمين ({allSessions.length} حصة)</option>
          {teachers.map(t => (
            <option key={t.key} value={t.key}>
              {t.name} ({allSessions.filter(s=>s.teacherKey===t.key).length} حصة)
            </option>
          ))}
        </select>
      </div>

      {/* Summary Cards */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
        <div style={{background:'#dcfce7',borderRadius:10,padding:'10px 8px',textAlign:'center'}}>
          <div style={{fontWeight:900,fontSize:18,color:'#15803d'}}>
            {filtered.filter(s=>s.status==='present').length}
          </div>
          <div style={{fontSize:10,color:GR,fontWeight:700}}>✅ Present</div>
        </div>
        <div style={{background:'#fef9c3',borderRadius:10,padding:'10px 8px',textAlign:'center'}}>
          <div style={{fontWeight:900,fontSize:18,color:'#a16207'}}>
            {filtered.filter(s=>s.status==='absent_paid').length}
          </div>
          <div style={{fontSize:10,color:GR,fontWeight:700}}>❌ Absent-paid</div>
        </div>
        <div style={{background:'#fee2e2',borderRadius:10,padding:'10px 8px',textAlign:'center'}}>
          <div style={{fontWeight:900,fontSize:18,color:'#dc2626'}}>
            {filtered.filter(s=>s.status==='absent_unpaid' || s.status==='pending').length}
          </div>
          <div style={{fontSize:10,color:GR,fontWeight:700}}>⏳ Pending</div>
        </div>
      </div>

      {/* Sessions List with 12-hour format */}
      {filtered.length === 0 && (
        <div style={{textAlign:'center',padding:'40px 0',color:GR}}>
          <div style={{fontSize:36,marginBottom:8}}>📅</div>
          <div>لا توجد حصص مسجلة في الفترة الحالية</div>
          <div style={{fontSize:12,marginTop:6}}>(من 6:00 صباحاً حتى 6:00 صباحاً الغد بتوقيت مصر)</div>
        </div>
      )}

      {filtered.map((s,i) => {
        const st = stColors[s.status] || stColors[s.type] || stColors.pending;
        const prev = i > 0 ? filtered[i-1] : null;
        const showGap = prev && (s.date !== prev.date || (s.startTime && prev.startTime && s.startTime > prev.startTime));

        return (
          <div key={s._key}>
            {showGap && (
              <div style={{textAlign:'center',padding:'8px 0',color:GR,fontSize:11,fontWeight:700}}>
                ──── {s.date !== prev.date ? (s.date === egyptToday ? 'اليوم' : 'الغد') : ''} ────
              </div>
            )}
            <div style={{
              background:WH, borderRadius:14, padding:'12px 14px', marginBottom:10,
              boxShadow:'0 2px 10px rgba(0,0,0,.07)', borderRight:`4px solid ${st.text}`,
              display:'flex', flexDirection:'column', gap:6
            }}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div>
                  <div style={{fontWeight:900,fontSize:15}}>{s.studentName}</div>
                  <div style={{fontSize:12,color:GR,marginTop:2}}>👨‍🏫 {s.teacherName}</div>
                </div>
                <span style={{
                  background:st.bg, color:st.text, borderRadius:20,
                  padding:'3px 10px', fontSize:11, fontWeight:700
                }}>
                  {st.label}
                </span>
              </div>
              <div style={{display:'flex',gap:12,fontSize:13,color:GR,alignItems:'center'}}>
                {/* 12-hour format */}
                <span style={{fontWeight:700,color:TX,fontSize:14}}>⏰ {to12Hour(s.startTime) || '—'}</span>
                <span>⏱ {durL[s.dur] || s.dur+'h'}</span>
                <span>{s.type || 'عادية'}</span>
                <span style={{fontSize:10,color:'#7a5a0a'}}>{s.note}</span>
              </div>
              {s.studentNote && (
                <div style={{fontSize:12,color:GR,background:'#f6f8fa',borderRadius:8,padding:'6px 10px'}}>
                  📝 {s.studentNote}
                </div>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ══════════════════════════════════════════════
//  ADD STUDENT FOR TEACHER (with auto session generation)
// ══════════════════════════════════════════════
function AddStudentForTeacher({configTeachers, onAddStudent}){
  const [selectedTeacher, setSelectedTeacher] = useState('');
  const [form, setForm] = useState({
    name:'', age:'', state:'', program:'قرآن كريم',
    monthly:'8', dur:'0.75', notes:'',
    schedule:[{day:'', h:'09', m:'00', ampm:'AM'}]
  });
  const [showPreview, setShowPreview] = useState(false);
  const [previewRows, setPreviewRows] = useState([]);
  const [toast, showToast] = useToast();

  const teachers = Object.entries(configTeachers || {}).map(([k,v]) => ({...v, _key:k}));
  const selectedTeacherObj = teachers.find(t => t._key === selectedTeacher);

  const updateForm = (field, val) => {
    setForm(f => ({...f, [field]: val}));
  };

  const addScheduleRow = () => {
    setForm(f => ({...f, schedule: [...f.schedule, {day:'', h:'09', m:'00', ampm:'AM'}]}));
  };

  const updateSchedule = (i, field, val) => {
    setForm(f => ({
      ...f,
      schedule: f.schedule.map((r, idx) => idx === i ? {...r, [field]: val} : r)
    }));
  };

  const removeSchedule = (i) => {
    setForm(f => ({...f, schedule: f.schedule.filter((_, idx) => idx !== i)}));
  };

  const refreshPreview = () => {
    if (!selectedTeacher || !form.state || form.schedule.length === 0) {
      setShowPreview(false);
      return;
    }
    const stateObj = ALL_STATES.find(s => s.abbr === form.state);
    if (!stateObj) return;

    const rows = form.schedule.filter(r => r.day !== '').map(r => {
      const egStr = DAYS_AR[parseInt(r.day)] + ' ' + r.h + ':' + String(r.m).padStart(2,'0') + ' ' + r.ampm;
      const usStr = egToUS(r.h, r.m, r.ampm, stateObj.tz);
      return {egStr, usStr, stateName: stateObj.name};
    });

    setPreviewRows(rows);
    setShowPreview(rows.length > 0);
  };

  useEffect(() => {
    refreshPreview();
  }, [form.schedule, form.state, selectedTeacher]);

  const handleSubmit = async () => {
    if (!selectedTeacher) { showToast('اختر المعلم أولاً'); return; }
    if (!form.name.trim()) { showToast('أدخل اسم الطالب'); return; }
    if (!form.state) { showToast('اختر الولاية'); return; }

    const stateObj = ALL_STATES.find(s => s.abbr === form.state);
    const schedule = form.schedule.filter(r => r.day !== '');

    const student = {
      name: form.name.trim(),
      state: form.state,
      stateName: stateObj ? stateObj.name : form.state,
      tz: stateObj ? stateObj.tz : '',
      age: form.age,
      program: form.program,
      notes: form.notes.trim(),
      monthlyTarget: parseInt(form.monthly) || 0,
      defaultDur: parseFloat(form.dur) || 0.75,
      schedule: schedule,
      addedAt: Date.now(),
      addedBy: 'مشرفة',
    };

    // Save student + auto-generate sessions
    await onAddStudent(selectedTeacher, student);

    // Reset form
    setForm({
      name:'', age:'', state:'', program:'قرآن كريم',
      monthly:'8', dur:'0.75', notes:'',
      schedule:[{day:'', h:'09', m:'00', ampm:'AM'}]
    });
    setSelectedTeacher('');
    setShowPreview(false);
    showToast('✅ تم إضافة الطالب للمعلم ' + (selectedTeacherObj?.name || '') + ' وتم إنشاء الجدول أوتوماتيك!');
  };

  return (
    <div style={{padding:16}}>
      <Toast msg={toast}/>

      <div style={{...sCard(GOLD), background:GOLDP, marginBottom:14}}>
        <div style={{fontWeight:900, fontSize:14, color:'#7a5a0a', marginBottom:14}}>➕ إضافة طالب جديد لمعلم</div>

        {/* Select Teacher */}
        <div style={{marginBottom:12}}>
          <div style={{fontSize:12, fontWeight:700, color:'#7a5a0a', marginBottom:4}}>اختر المعلم *</div>
          <select value={selectedTeacher} onChange={e=>setSelectedTeacher(e.target.value)} style={sInp}>
            <option value="">— اختر المعلم —</option>
            {teachers.map(t => (
              <option key={t._key} value={t._key}>{t.name}</option>
            ))}
          </select>
        </div>

        {/* Student Name & Age */}
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:10}}>
          <div>
            <div style={{fontSize:12, fontWeight:700, color:'#7a5a0a', marginBottom:4}}>اسم الطالب *</div>
            <input value={form.name} onChange={e=>updateForm('name', e.target.value)} placeholder="مثال: محمد أحمد" style={sInp}/>
          </div>
          <div>
            <div style={{fontSize:12, fontWeight:700, color:'#7a5a0a', marginBottom:4}}>العمر</div>
            <input value={form.age} onChange={e=>updateForm('age', e.target.value)} placeholder="مثال: 8" style={sInp}/>
          </div>
        </div>

        {/* Monthly & Duration */}
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:10}}>
          <div>
            <div style={{fontSize:12, fontWeight:700, color:'#7a5a0a', marginBottom:4}}>الحصص الشهرية</div>
            <input type="number" value={form.monthly} onChange={e=>updateForm('monthly', e.target.value)} min="1" max="30" style={sInp}/>
          </div>
          <div>
            <div style={{fontSize:12, fontWeight:700, color:'#7a5a0a', marginBottom:4}}>وقت الحصة</div>
            <select value={form.dur} onChange={e=>updateForm('dur', e.target.value)} style={sInp}>
              <option value="0.25">15 دقيقة</option>
              <option value="0.5">30 دقيقة</option>
              <option value="0.75" selected>45 دقيقة</option>
              <option value="1">ساعة</option>
            </select>
          </div>
        </div>

        {/* State */}
        <div style={{marginBottom:10}}>
          <div style={{fontSize:12, fontWeight:700, color:'#7a5a0a', marginBottom:4}}>الولاية الأمريكية *</div>
          <select value={form.state} onChange={e=>updateForm('state', e.target.value)} style={sInp}>
            <option value="">— اختر الولاية —</option>
            {ALL_STATES.map(s => (
              <option key={s.abbr} value={s.abbr}>{s.name} ({s.abbr})</option>
            ))}
          </select>
        </div>

        {/* Program */}
        <div style={{marginBottom:10}}>
          <div style={{fontSize:12, fontWeight:700, color:'#7a5a0a', marginBottom:4}}>البرنامج</div>
          <select value={form.program} onChange={e=>updateForm('program', e.target.value)} style={sInp}>
            {['قرآن كريم','تجويد','لغة عربية','دراسات إسلامية','قرآن + عربي'].map(o => (
              <option key={o}>{o}</option>
            ))}
          </select>
        </div>

        {/* Weekly Schedule */}
        <div style={{marginBottom:10}}>
          <div style={{fontSize:12, fontWeight:700, color:'#7a5a0a', marginBottom:4}}>📅 مواعيد الحصص الأسبوعية (بتوقيت مصر) — 12 ساعة</div>
          {form.schedule.map((r, i) => (
            <div key={i} style={{display:'flex', gap:6, alignItems:'center', marginBottom:6}}>
              <select value={r.day} onChange={e=>updateSchedule(i, 'day', e.target.value)} style={{...sInp, flex:1, fontSize:12}}>
                <option value="">اليوم</option>
                {DAYS_AR.map((d, idx) => <option key={idx} value={idx}>{d}</option>)}
              </select>
              <input type="number" value={r.h} onChange={e=>updateSchedule(i, 'h', e.target.value)} style={{...sInp, width:50, textAlign:'center', fontSize:12}} min="1" max="12"/>
              <span style={{color:GOLD}}>:</span>
              <input type="number" value={r.m} onChange={e=>updateSchedule(i, 'm', e.target.value)} style={{...sInp, width:50, textAlign:'center', fontSize:12}} min="0" max="59"/>
              <select value={r.ampm} onChange={e=>updateSchedule(i, 'ampm', e.target.value)} style={{...sInp, width:60, fontSize:12}}>
                <option>AM</option><option>PM</option>
              </select>
              {form.schedule.length > 1 && (
                <button onClick={()=>removeSchedule(i)} style={{background:RP, border:`1px solid ${R}`, borderRadius:6, padding:'4px 8px', color:R, fontSize:11, cursor:'pointer'}}>✕</button>
              )}
            </div>
          ))}
          <button onClick={addScheduleRow} style={{...sBtn(G), width:'100%', padding:8, fontSize:12, marginTop:4}}>+ إضافة موعد</button>
        </div>

        {/* Time Preview */}
        {showPreview && previewRows.length > 0 && (

// ══════════════════════════════════════════════
//  TEACHER DAILY REPORTS
// ══════════════════════════════════════════════
function TeacherDailyReports({teacherData, configTeachers}){
  const [filterDate, setFilterDate] = useState(todayStr());
  const [collapsed, setCollapsed] = useState({});
  const [toast, showToast] = useToast();

  const teachers = Object.entries(configTeachers || {}).map(([k,v]) => ({...v, _key:k}));

  let allReports = [];
  Object.entries(teacherData || {}).forEach(([teacherKey, teacher]) => {
    const teacherName = configTeachers?.[teacherKey]?.name || teacherKey;
    const reports = teacher?.dailyReports || {};
    Object.entries(reports).forEach(([repKey, rep]) => {
      if (rep.date === filterDate) {
        allReports.push({...rep, _key: repKey, teacherKey, teacherName});
      }
    });
  });

  allReports.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));

  const stColors = {
    present: {bg:'#dcfce7', text:'#15803d', label:'✅ حضور'},
    absent:  {bg:'#fee2e2', text:'#dc2626', label:'❌ غياب'},
    makeup:  {bg:'#fef9c3', text:'#a16207', label:'🔄 تعويض'},
    trial:   {bg:'#e0e7ff', text:'#4338ca', label:'🧪 ترايل'},
    general: {bg:'#f3f4f6', text:'#374151', label:'📋 تقرير عام'},
  };

  const copyToClipboard = (text, label) => {
    navigator.clipboard.writeText(text)
      .then(() => showToast('✅ تم النسخ — ' + label))
      .catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
        document.body.appendChild(ta); ta.select(); document.execCommand('copy');
        document.body.removeChild(ta); showToast('✅ تم النسخ — ' + label);
      });
  };

  const toggleCollapse = (key) => setCollapsed(prev => ({...prev, [key]: !prev[key]}));

  return (
    <div style={{padding:16}}>
      <Toast msg={toast}/>

      {/* ── Date filter ── */}
      <div style={{...sCard(B), marginBottom:16}}>
        <div style={{fontWeight:900, fontSize:14, color:B, marginBottom:12}}>📋 تقارير المعلمين اليومية</div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:12, fontWeight:700, color:GR, marginBottom:4}}>📅 التاريخ</div>
          <input type="date" value={filterDate} onChange={e => setFilterDate(e.target.value)} style={sInp}/>
        </div>
        <div style={{display:'flex', gap:8}}>
          <button onClick={() => setFilterDate(todayStr())} style={{...sBtn(G), padding:'6px 14px', fontSize:12}}>اليوم</button>
          <button onClick={() => { const d=new Date(); d.setDate(d.getDate()-1); setFilterDate(d.toISOString().slice(0,10)); }}
            style={{...sBtn(GR), padding:'6px 14px', fontSize:12}}>أمس</button>
        </div>
      </div>

      {/* ── Empty state ── */}
      {allReports.length === 0 && (
        <div style={{textAlign:'center', padding:'40px 0', color:GR}}>
          <div style={{fontSize:40, marginBottom:8}}>📋</div>
          <div style={{fontWeight:700}}>لا توجد تقارير لهذا اليوم</div>
        </div>
      )}

      {/* ── One section per teacher ── */}
      {teachers.map(t => {
        const tReports = allReports.filter(r => r.teacherKey === t._key);
        if (!tReports.length) return null;
        const isOpen = !collapsed[t._key];
        const present = tReports.filter(r => r.type==='present').length;
        const absent  = tReports.filter(r => r.type==='absent').length;
        const headerColor = absent > present ? R : G;

        return (
          <div key={t._key} style={{marginBottom:16, borderRadius:14, overflow:'hidden', boxShadow:'0 2px 10px rgba(0,0,0,.08)'}}>

            {/* Teacher header — tap to collapse */}
            <div onClick={() => toggleCollapse(t._key)}
              style={{background:headerColor, color:'#fff', padding:'12px 16px', display:'flex', justifyContent:'space-between', alignItems:'center', cursor:'pointer'}}>
              <div>
                <div style={{fontWeight:900, fontSize:14}}>👨‍🏫 {t.name}</div>
                <div style={{fontSize:11, opacity:.8, marginTop:2}}>
                  ✅ {present} حضور &nbsp;❌ {absent} غياب &nbsp;| {tReports.length} تقرير
                </div>
              </div>
              <span style={{fontSize:18}}>{isOpen ? '▲' : '▼'}</span>
            </div>

            {/* Reports list */}
            {isOpen && tReports.map((r, idx) => {
              const st = stColors[r.type] || stColors.present;
              return (
                <div key={r._key} style={{background:WH, padding:'12px 14px', borderRight:`4px solid ${st.text}`,
                  borderBottom: idx < tReports.length-1 ? '1px solid #f0f0f0' : 'none'}}>

                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:6}}>
                    <div>
                      <div style={{fontWeight:900, fontSize:14}}>{r.studentName || 'طالب'}</div>
                      <div style={{fontSize:11, color:GR}}>{fmtTime(r.createdAt)}</div>
                    </div>
                    <span style={{background:st.bg, color:st.text, borderRadius:20, padding:'3px 10px', fontSize:11, fontWeight:700}}>
                      {st.label}
                    </span>
                  </div>

                  {r.duration && (
                    <div style={{fontSize:12, color:GR, marginBottom:4}}>⏱ {r.duration} دقيقة</div>
                  )}

                  {r.notes
                    ? <div style={{fontSize:13, color:TX, background:'#f8fafc', borderRadius:8, padding:'8px 10px', marginBottom:8, lineHeight:1.6}}>
                        {r.notes}
                      </div>
                    : <div style={{fontSize:12, color:GR, fontStyle:'italic', marginBottom:8}}>لا توجد ملاحظات</div>
                  }

                  <button
                    onClick={() => r.notes ? copyToClipboard(r.notes, r.studentName) : showToast('لا توجد ملاحظات')}
                    style={{width:'100%', padding:'9px', background: r.notes ? '#25d366' : '#9ca3af',
                      color:'#fff', border:'none', borderRadius:8, fontSize:13, fontWeight:700,
                      cursor: r.notes ? 'pointer' : 'default', fontFamily:'Cairo,sans-serif'}}>
                    📋 نسخ تقرير {r.studentName || 'الطالب'}
                  </button>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

            <input type="date" value={form.date} onChange={e => setForm(f => ({...f, date: e.target.value}))} style={sInp}/>
          </div>
        </div>

        <div style={{marginBottom:14}}>
          <div style={{fontSize:12, fontWeight:700, color:GR, marginBottom:4}}>ملاحظات</div>
          <textarea value={form.notes} onChange={e => setForm(f => ({...f, notes: e.target.value}))} placeholder="أي ملاحظات..." style={{...sInp, resize:'vertical', minHeight:60}}/>
        </div>

        <button onClick={handleSubmit} style={{...sBtn(G), width:'100%', padding:13}}>📤 إرسال التقرير</button>

  );

//  TEACHER MANAGEMENT
// ══════════════════════════════════════════════
function TeacherMgmt({teachers, onAdd, onDelete, onUpdatePin}){
  const [name,setName]=useState('');
  const [pin,setPin]=useState('');
  const [editPin,setEditPin]=useState({});
  const [toast,showToast]=useToast();
  const list=Object.entries(teachers||{}).map(([k,v])=>({...v,_key:k}));

  const add=async()=>{
    if(!name.trim()||pin.length<3){showToast('أدخل الاسم والرمز (3 أرقام على الأقل)');return;}
    await onAdd({name:name.trim(),pin});
    setName('');setPin('');showToast('✅ تم إضافة المعلم!');
  };

  return(
    <div style={{padding:16}}>
      <Toast msg={toast}/>
      <div style={{...sCard(GOLD),background:GOLDP,marginBottom:14}}>
        <div style={{fontWeight:900,fontSize:14,color:'#7a5a0a',marginBottom:12}}>➕ إضافة معلم جديد</div>
        <div style={{display:'flex',gap:8,marginBottom:10}}>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:700,color:'#7a5a0a',marginBottom:4}}>الاسم *</div>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="اسم المعلم" style={sInp}/>
          </div>
          <div style={{width:120}}>
            <div style={{fontSize:12,fontWeight:700,color:'#7a5a0a',marginBottom:4}}>PIN *</div>
            <input type="password" value={pin} onChange={e=>setPin(e.target.value)} placeholder="رمز" style={sInp}/>
          </div>
        </div>
        <button onClick={add} style={{...sBtn(GOLD),width:'100%',padding:12}}>✅ إضافة المعلم</button>
      </div>

      <div style={{fontWeight:900,fontSize:14,color:G,marginBottom:10}}>👨‍🏫 المعلمون الحاليون ({list.length})</div>
      {list.length===0&&<div style={{textAlign:'center',padding:'30px 0',color:GR}}>لم يتم إضافة معلمين بعد</div>}
      {list.map(t=>{
        const stuCount=Object.keys(t.students||{}).length;
        return(
          <div key={t._key} style={sCard(G)}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
              <div>
                <div style={{fontWeight:900,fontSize:14}}>{t.name}</div>
                <div style={{fontSize:12,color:GR,marginTop:2}}>👥 {stuCount} طالب • PIN: {t.pin||'—'}</div>
              </div>
              <button onClick={()=>onDelete(t._key)} style={{background:RP,border:`1px solid ${R}`,borderRadius:8,padding:'4px 10px',color:R,fontFamily:'Cairo,sans-serif',fontSize:11,cursor:'pointer',fontWeight:700}}>حذف</button>
            </div>
            <div style={{display:'flex',gap:8}}>
              <input type="password" value={editPin[t._key]||''} onChange={e=>setEditPin(p=>({...p,[t._key]:e.target.value}))} placeholder="تغيير PIN" style={{...sInp,flex:1,fontSize:13}}/>
              <button onClick={async()=>{if(editPin[t._key]?.length>=3){await onUpdatePin(t._key,editPin[t._key]);setEditPin(p=>({...p,[t._key]:''}));showToast('✅ تم تغيير الرمز!');}}} style={{...sBtn(G),padding:'9px 14px',flexShrink:0,fontSize:12}}>حفظ</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function TeachersView({configTeachers, teacherData, isAdmin}){

  const [editForm,setEditForm]=useState({name:'',age:'',program:'قرآن كريم',state:'',notes:''});
  const [editSchedule,setEditSchedule]=useState([]);
  const [toast,showToast]=useToast();

  const list=Object.entries(configTeachers||{}).map(([k,v])=>({
    ...v, _key:k,
    students: (teacherData||{})[k]?.students || {},
    sessions: (teacherData||{})[k]?.sessions || {},
  }));
  const sel=list.find(t=>t._key===selKey);

  const openEditStudent=(teacherKey, stu)=>{
    setEditStudentKey(stu._key);

      name: stu.name||'', age: stu.age||'', program: stu.program||'قرآن كريم',
      state: stu.state||'', notes: stu.notes||'', teacherKey
    });

  };

  const saveEditStudent=async()=>{
    if(!editForm.name.trim()){showToast('أدخل اسم الطالب');return;}
    const stateObj=ALL_STATES.find(s=>s.abbr===editForm.state);
    const updates={
      name: editForm.name.trim(),
      age: editForm.age,
      program: editForm.program,
      state: editForm.state,
      stateName: stateObj?stateObj.name:editForm.state,
      tz: stateObj?stateObj.tz:'',
      notes: editForm.notes.trim(),
      schedule: editSchedule.filter(r=>r.day!==''),
      updatedAt: Date.now(),
    };
    await DB.update(`teachers/${editForm.teacherKey}/students/${editStudentKey}`, updates);
    setEditStudentKey(null);
    showToast('✅ تم تحديث بيانات الطالب!');
  };

  if(selKey&&sel){

                <div style={{fontSize:12,fontWeight:700,color:GR,marginBottom:4}}>الاسم *</div>

          </div>
        )}

        {students.map(s=>{
          const st=ALL_STATES.find(x=>x.abbr===s.state);
          return(
            <div key={s._key} style={{...sCard(G),marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
                <div>
                  <span style={{fontWeight:900,fontSize:15}}>{s.name}</span>
                  <span style={{background:GP,color:G,borderRadius:20,padding:'2px 10px',fontSize:11,fontWeight:700,marginRight:8}}>{s.program}</span>
                </div>
                <button onClick={()=>openEditStudent(sel._key,s)} style={{background:BP,border:`1px solid ${B}`,borderRadius:8,padding:'4px 10px',color:B,fontSize:12,cursor:'pointer',fontWeight:700}}>✏️ تعديل</button>
              </div>
              <div style={{fontSize:12,color:GR,marginBottom:6}}>{s.stateName||s.state}{s.age?' • '+s.age+' سنوات':''}</div>
              {(s.schedule||[]).length>0&&(
                <div style={{background:GP,borderRadius:8,padding:'8px 10px'}}>
                  {(s.schedule||[]).map((r,i)=>{
                    const usTime=st?egToUS(r.h,r.m,r.ampm,st.tz):'—';
                    return(
                      <div key={i} style={{display:'flex',gap:8,alignItems:'center',fontSize:12,padding:'4px 0',borderBottom:i<s.schedule.length-1?'1px dashed '+BD:'none'}}>
                        <span style={{fontWeight:700,color:G,minWidth:60}}>{DAYS_AR[parseInt(r.day)]}</span>
                        <span>🇪🇬 {r.h}:{r.m} {r.ampm}</span>
                        <span style={{color:GR}}>→</span>
                        <span style={{color:B,fontWeight:700}}>🇺🇸 {usTime}</span>
                      </div>
                    );
                  })}
                </div>
              )}
              {s.notes&&<div style={{fontSize:12,color:GR,marginTop:6}}>📝 {s.notes}</div>}
            </div>
          );
        })}
      </div>
    );
  }

  return(
    <div style={{padding:16}}>
      <div style={{fontWeight:900,fontSize:14,color:G,marginBottom:14}}>👨‍🏫 المعلمون ({list.length})</div>
      {list.length===0&&<div style={{textAlign:'center',padding:'40px 0',color:GR}}><div style={{fontSize:36,marginBottom:8}}>👨‍🏫</div><div>لم يتم إضافة معلمين بعد</div><div style={{fontSize:12,marginTop:6}}>المعلمون يضيفون طلابهم من بوابة المعلمين</div></div>}
      {list.map(t=>{
        const stuCount=Object.keys(t.students||{}).length;
        const sessCount=Object.keys(t.sessions||{}).length;
        return(
          <div key={t._key} onClick={()=>setSelKey(t._key)} style={{...sCard(G),cursor:'pointer',marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontWeight:900,fontSize:15}}>{t.name}</div>
                <div style={{fontSize:12,color:GR,marginTop:3}}>👥 {stuCount} طالب • 📅 {sessCount} جلسة</div>
              </div>
              <span style={{fontSize:20,color:G}}>←</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ══════════════════════════════════════════════
//  TEACHER SCHEDULE VIEW — Weekly + Free Slots + Today's Sessions
// ══════════════════════════════════════════════
function TeacherScheduleView({teacherKey, teacherData, teacherName}){
  const myStudents = (teacherData?.[teacherKey]?.students) || {};
  const mySessions = (teacherData?.[teacherKey]?.sessions) || {};

  // Today's sessions in Egypt day (6 AM - 6 AM)
  const egyptToday = getEgyptTodayStr();
  const todaySessions = Object.entries(mySessions)
    .map(([k, s]) => ({...s, _key: k}))
    .filter(s => isInCurrentEgyptDay(s.date, s.startTime, egyptToday))
    .sort((a, b) => (a.startTime || '').localeCompare(b.startTime || ''));

  // All sessions array for free slots calculation
  const allSessArr = Object.entries(mySessions).map(([k, s]) => s);

  // Free slots for next 7 days
  const now = new Date();
  const next7Dates = [];
  for (var di = 0; di < 7; di++) {
    var dd = new Date(now.getFullYear(), now.getMonth(), now.getDate() + di);
    next7Dates.push(dd.toISOString().slice(0, 10));
  }
  const upcomingSess = allSessArr.filter(s => next7Dates.includes(s.date));
  const freeSlots = calcFreeSlots(upcomingSess, "06:00", "23:59").filter(fs => next7Dates.includes(fs.date));

  // Weekly schedule grouped by day
  const weeklySchedule = {};
  for (var wi = 0; wi < DAYS_AR.length; wi++) { weeklySchedule[DAYS_AR[wi]] = []; }
  for (var si = 0; si < allSessArr.length; si++) {
    var ss = allSessArr[si];
    var dObj = new Date(ss.date + "T12:00:00+02:00");
    var dn = DAYS_AR[dObj.getDay()];
    if (!weeklySchedule[dn]) weeklySchedule[dn] = [];
    // Avoid duplicates
    var exists = weeklySchedule[dn].find(function(ex) {
      return ex.startTime === ss.startTime && ex.studentName === ss.studentName;
    });
    if (!exists) weeklySchedule[dn].push(ss);
  }

  // Count unique students per day
  for (var wk in weeklySchedule) {
    weeklySchedule[wk].sort(function(a, b) {
      return (a.startTime || '').localeCompare(b.startTime || '');
    });
  }

  return (
    <div style={{padding:16}}>
      <div style={{fontWeight:900, fontSize:14, color:B, marginBottom:14}}>
        📅 جدولي — {teacherName}
      </div>

      {/* Today's sessions - 12 hour format */}
      <div style={{...sCard(G), marginBottom:14}}>
        <div style={{fontWeight:900, fontSize:13, color:G, marginBottom:10}}>
          📆 حصص اليوم (من 6:00 صباحاً) — {getEgyptDayName(egyptToday)} {egyptToday}
        </div>
        {todaySessions.length === 0 && (
          <div style={{color:GR, fontSize:12, textAlign:'center', padding:'10px 0'}}>
            لا توجد حصص في الفترة الحالية
          </div>
        )}
        {todaySessions.map(s => (
          <div key={s._key} style={{display:'flex', justifyContent:'space-between', padding:'8px 0', borderBottom:'1px dashed #d1e7d9', fontSize:12, alignItems:'center'}}>
            <span style={{fontWeight:700, fontSize:13}}>{s.studentName}</span>
            <div style={{display:'flex', gap:10, alignItems:'center'}}>
              <span style={{color:B, fontWeight:700, fontSize:13}}>{to12Hour(s.startTime)}</span>
              <span style={{color:GR, fontSize:11}}>{s.dur || 0.75}h</span>
              <span style={{background:s.status==='present'?'#dcfce7':s.status==='absent_paid'?'#fef9c3':'#e0e7ff', color:s.status==='present'?'#15803d':s.status==='absent_paid'?'#a16207':'#4338ca', borderRadius:12, padding:'2px 8px', fontSize:10, fontWeight:700}}>
                {s.status === 'present' ? '✅' : s.status === 'absent_paid' ? '❌' : '⏳'}
              </span>
            </div>
          </div>
        ))}
      </div>

      {/* Weekly schedule - 12 hour format */}
      <div style={{...sCard(B), marginBottom:14}}>
        <div style={{fontWeight:900, fontSize:13, color:B, marginBottom:10}}>📋 الجدول الأسبوعي (12 ساعة)</div>
        {DAYS_AR.map(day => {
          const daySess = weeklySchedule[day] || [];
          if (daySess.length === 0) return null;
          return (
            <div key={day} style={{marginBottom:12, background:'#f8fafc', borderRadius:8, padding:'8px 10px'}}>
              <div style={{fontWeight:800, fontSize:12, color:G, marginBottom:6}}>{day} ({daySess.length} حصة)</div>
              {daySess.map((s, i) => (
                <div key={i} style={{fontSize:11, padding:'4px 0', paddingRight:12, color:TX, display:'flex', justifyContent:'space-between', borderBottom:i < daySess.length-1 ? '1px solid #e5e7eb' : 'none'}}>
                  <span style={{fontWeight:600}}>{s.studentName}</span>
                  <span style={{color:B, fontWeight:700}}>{to12Hour(s.startTime)} ({s.dur || 0.75}h)</span>
                </div>
              ))}
            </div>
          );
        })}
        {DAYS_AR.every(d => !(weeklySchedule[d] || []).length) && (
          <div style={{color:GR, fontSize:12, textAlign:'center', padding:'10px 0'}}>لا توجد حصص مسجلة في الجدول</div>
        )}
      </div>

      {/* Free slots - 12 hour format */}
      <div style={{...sCard(GOLD), background:GOLDP}}>
        <div style={{fontWeight:900, fontSize:13, color:'#7a5a0a', marginBottom:10}}>⏰ أوقات الفراغ القادمة (12 ساعة)</div>
        {freeSlots.length === 0 && (
          <div style={{fontSize:12, color:GR, textAlign:'center', padding:'10px 0'}}>لا توجد بيانات كافية أو كل الأوقات محجوزة</div>
        )}
        {freeSlots.slice(0, 30).map((slot, i) => (
          <div key={i} style={{display:'flex', justifyContent:'space-between', padding:'6px 0', borderBottom:'1px dashed #e0c870', fontSize:12, alignItems:'center'}}>
            <span style={{fontWeight:700, color:'#7a5a0a'}}>{slot.date} ({getEgyptDayName(slot.date)})</span>
            <span style={{fontWeight:900, color:G, fontSize:13}}>{to12Hour(slot.start)} — {to12Hour(slot.end)}</span>
          </div>
        ))}
      </div>

      {/* Students list */}
      <div style={{...sCard(G), marginTop:14}}>
        <div style={{fontWeight:900, fontSize:13, color:G, marginBottom:10}}>👥 طلابي ({Object.keys(myStudents).length})</div>
        {Object.entries(myStudents).map(([k, s]) => (
          <div key={k} style={{padding:'5px 0', borderBottom:'1px dashed #d1e7d9', fontSize:12}}>
            <span style={{fontWeight:700}}>{s.name}</span>
            <span style={{color:GR, marginRight:8}}>{s.program} • {s.stateName || s.state}</span>
          </div>
        ))}
        {Object.keys(myStudents).length === 0 && (
          <div style={{color:GR, fontSize:12, textAlign:'center'}}>لا يوجد طلاب مضافون</div>
        )}
      </div>
    </div>
  );
}

//  SUP SCREEN
// ══════════════════════════════════════════════
function SupScreen({name,state,actions,onLogout}){
  const [tab,setTab]=useState('students');
  const [shift,setShift]=useState(1);
  const myPending=state.tasks.filter(t=>(t.to==='الكل'||t.to===name)&&!t.doneBy?.[name]);

  const doneTask=async key=>{
    const t=state.tasks.find(x=>x._key===key);
    if(!t) return;
    await DB.update(`tasks/${key}/doneBy`,{[name]:true});
  };

  // UPDATED: Add student + auto-generate sessions
  const handleAddStudent = async (teacherKey, student) => {
    // Save student
    await DB.push(`teachers/${teacherKey}/students`, student);
    // Auto-generate sessions for 30 days
    const sessions = generateAutoSessions(student, 30);
    for (var i = 0; i < sessions.length; i++) {
      await DB.push(`teachers/${teacherKey}/sessions`, sessions[i]);
    }
  };

  return(
    <div style={{minHeight:'100vh',background:BG}}>
      <Hdr name={name} role="sup" onLogout={onLogout} taskCount={myPending.length}/>
      <Tabs
        list={[
          {id:'students',label:'👥 الطلاب'},
          {id:'tasks',label:'📋 مهامي',badge:myPending.length},
          {id:'today',label:'📅 حصص اليوم'},
          {id:'add-student',label:'➕ إضافة طالب'},
          {id:'board',label:'🧪 البورد'},
          {id:'teachers',label:'👨‍🏫 المعلمين'},
          {id:'reports',label:'📋 التقارير'},
          {id:'check',label:'✅ الروتين'},
          {id:'msgs', label:'💬 الرسائل'},
          {id:'handover',label:'🔄 التسليم'},
        ]}
        active={tab} onChange={setTab}/>
      <div style={{paddingBottom:30}}>
        {tab==='students'&&<StudentsTab configTeachers={state.configTeachers}/>}
        {tab==='tasks'&&<TasksPanel tasks={state.tasks} supName={name} onDone={doneTask}/>}
        {tab==='today'&&<TodaySessionsAll teacherData={state.teacherData} configTeachers={state.configTeachers}/>}
        {tab==='add-student'&&<AddStudentForTeacher configTeachers={state.configTeachers} onAddStudent={handleAddStudent}/>}
        {tab==='teachers'&&<TeachersView configTeachers={state.configTeachers} teacherData={state.teacherData} isAdmin={false}/>}
        {tab==='board'&&<TrialsBoard trials={state.trials} currentUser={name} isAdmin={false} onUpdate={async(k,v)=>await DB.update(`trials/${k}`,v)} onDelete={async k=>await DB.remove(`trials/${k}`)} onAdd={async v=>{const r=await DB.push('trials',v);}}/>}
        {tab==='check'&&<CheckTab shift={shift} setShift={setShift} cl={state.cl}/>}
        {tab==='msgs'&&<MsgsTab msgs={state.msgs}/>}
        {tab==='handover'&&<HandoverTab supervisor={name} shift={shift} onSave={async v=>await DB.push('handovers',v)}/>}
        {tab==='reports'&&<TeacherDailyReports teacherData={state.teacherData} configTeachers={state.configTeachers}/>}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════
//  ADMIN SCREEN
// ══════════════════════════════════════════════
function AdminScreen({state,adminPin,onLogout}){
  const [tab,setTab]=useState('dash');
  const pendingTasks=state.tasks.filter(t=>!t.doneBy||Object.keys(t.doneBy).length===0);

  const handleSaveMsgs=async m=>await DB.set('config/msgs',m);
  const handleSaveCl=async c=>await DB.set('config/cl',c);
  const handleSaveSups=async s=>await DB.set('config/sups',s);
  const handleSavePin=async p=>await DB.set('config/pin',p);
  const handleAddTeacher=async t=>await DB.push('config/teachers',t);
  const handleDeleteTeacher=async k=>await DB.remove('config/teachers/'+k);
  const handleUpdateTeacherPin=async(k,p)=>await DB.update('config/teachers/'+k,{pin:p});

  return(
    <div style={{minHeight:'100vh',background:BG}}>
      <Hdr name="المدير" role="admin" onLogout={onLogout} taskCount={pendingTasks.length}/>
      <Tabs
        list={[
          {id:'dash',  label:'📊 اليوم'},
          {id:'students',label:'👥 الطلاب'},
          {id:'today', label:'📅 حصص اليوم'},
          {id:'board', label:'🧪 البورد'},
          {id:'teachers',label:'👨‍🏫 المعلمين'},
          {id:'tasks', label:'📤 المهام', badge:pendingTasks.length},
          {id:'edit',  label:'✏️ تعديل'},
          {id:'sups',  label:'👥 مشرفات'},
          {id:'reports',label:'📋 التقارير'},
        ]}
        active={tab} onChange={setTab}/>
      <div style={{paddingBottom:30}}>
        {tab==='dash'  &&<AdminDash handovers={state.handovers} trials={state.trials} tasks={state.tasks}/>}
        {tab==='students'&&<StudentsTab configTeachers={state.configTeachers}/>}
        {tab==='today' &&<TodaySessionsAll teacherData={state.teacherData} configTeachers={state.configTeachers}/>}
        {tab==='teachers'&&(
          <div>
            <TeacherMgmt teachers={state.configTeachers} onAdd={handleAddTeacher} onDelete={handleDeleteTeacher} onUpdatePin={handleUpdateTeacherPin}/>
            <div style={{borderTop:'2px dashed #d1e7d9',margin:'0 16px 0'}}/>
            <TeachersView configTeachers={state.configTeachers} teacherData={state.teacherData} isAdmin={true}/>
          </div>
        )}
        {tab==='board' &&<TrialsBoard trials={state.trials} currentUser="المدير" isAdmin={true} onUpdate={async(k,v)=>await DB.update(`trials/${k}`,v)} onDelete={async k=>await DB.remove(`trials/${k}`)} onAdd={async v=>await DB.push('trials',v)}/>}
        {tab==='tasks' &&<TasksAdmin tasks={state.tasks} sups={state.sups} onSend={async v=>await DB.push('tasks',{...v,createdAt:Date.now(),doneBy:{}})} onDelete={async k=>await DB.remove(`tasks/${k}`)}/>}
        {tab==='edit'  &&<EditContent msgs={state.msgs} cl={state.cl} onSaveMsgs={handleSaveMsgs} onSaveCl={handleSaveCl}/>}
        {tab==='sups'  &&<AdminSups sups={state.sups} adminPin={adminPin} supPins={state.supPins} onSaveSups={handleSaveSups} onSavePin={handleSavePin} onSaveSupPins={async p=>await DB.set('config/supPins',p)}/>}
        {tab==='reports'&&<TeacherDailyReports teacherData={state.teacherData} configTeachers={state.configTeachers}/>}
      </div>
    </div>
  );
}

//  ROOT APP
// ══════════════════════════════════════════════
function App(){
  const [screen,setScreen]=useState('loading');
  const [user,setUser]=useState(null);
  const [adminPin,setAdminPin]=useState('1234');
  const [state,setState]=useState({trials:[],handovers:[],tasks:[],msgs:MSGS0,cl:CL0,sups:SUPS0,configTeachers:{},teacherData:{},supPins:{}});

  // Firebase real-time listeners
  useEffect(()=>{
    const unsubs=[];

    unsubs.push(DB.on('trials', v=>setState(s=>({...s,trials:objArr(v)}))));
    unsubs.push(DB.on('handovers', v=>setState(s=>({...s,handovers:objArr(v)}))));
    unsubs.push(DB.on('tasks', v=>setState(s=>({...s,tasks:objArr(v)}))));
    unsubs.push(DB.on('config/msgs', v=>setState(s=>({...s,msgs:v||MSGS0}))));
    unsubs.push(DB.on('config/cl',   v=>setState(s=>({...s,cl:v||CL0}))));
    unsubs.push(DB.on('config/sups', v=>setState(s=>({...s,sups:v||SUPS0}))));
    unsubs.push(DB.on('config/pin',  v=>{if(v)setAdminPin(v);}));
    unsubs.push(DB.on('config/supPins', v=>setState(s=>({...s,supPins:v||{}}))));
    unsubs.push(DB.on('teachers',        v=>setState(s=>({...s,teacherData:v||{}}))));
    unsubs.push(DB.on('config/teachers', v=>setState(s=>({...s,configTeachers:v||{}}))));

    setTimeout(()=>setScreen('login'),1200);
    return ()=>unsubs.forEach(fn=>fn());
  },[]);

  const loginSup=name=>{setUser({name,role:'sup'});setScreen('sup');};
  const loginAdmin=(pin,setErr)=>{

// ═══ TIME HELPERS ═══
function getOffsetMs(date, tz) {
  const local = new Date(date.toLocaleString("en-US", {timeZone: tz}));
  const utc   = new Date(date.toLocaleString("en-US", {timeZone: "UTC"}));
  return local - utc;
}
function fmtT(date, tz) {
  return new Intl.DateTimeFormat("en-US", {timeZone:tz, hour:"2-digit", minute:"2-digit", hour12:true}).format(date);
}
function egTimeToUS(h12, min, ampm, stateTz) {
  try {
    let h = parseInt(h12);
    const m = parseInt(min);
    if (ampm === "PM" && h !== 12) h += 12;
    if (ampm === "AM" && h === 12) h = 0;
    const today = new Date().toISOString().slice(0,10);
    const probe = new Date(today + "T12:00:00Z");
    const egOffset = getOffsetMs(probe, EGYPT_TZ);
    const naiveUTC = new Date(today + "T" + String(h).padStart(2,"0") + ":" + String(m).padStart(2,"0") + ":00Z");
    const utcDate  = new Date(naiveUTC.getTime() - egOffset);
    return fmtT(utcDate, stateTz);
  } catch(e) { return "—"; }
}

//  EXCEL EXPORT

function downloadExcel() {
  if (!mySessions.length) { showToast('لا توجد جلسات'); return; }

  const durMap = {0.25: 15, 0.5: 30, 0.75: 45, 1: 60, 1.5: 90, 2: 120};
  const statusMap = {present: 'Present', absent_paid: 'Absent-paid', absent_unpaid: 'Absent-not paid'};

  // Get unique students sorted by name
  const stuKeys = [...new Set(mySessions.map(s => s.studentKey))];
  const stuNames = stuKeys.map(k => {
    const s = myStudents.find(x => x._key === k);
    return s ? s.name : k;
  });

  // Get date range (all days from earliest to latest session)
  const dates = mySessions.map(s => s.date).sort();
  const startDate = new Date(dates[0]);
  const endDate   = new Date(dates[dates.length - 1]);
  const dayList   = [];
  for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
    dayList.push(new Date(d).toISOString().slice(0, 10));
  }

  const DAYS_AR_EX = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

  const wb = XLSX.utils.book_new();
  const ws_data = [];

  // Row 1: Teacher name + student names (each student spans 3 columns)
  const row1 = ['Date'];
  row1.push(currentTeacher.name); // Teacher name in col B
  stuNames.forEach(n => { row1.push(n, '', ''); }); // Each student: name + 2 empty
  row1.push('Total Hours');
  ws_data.push(row1);

  // Row 2: empty (spacing row)
  ws_data.push(Array(row1.length).fill(''));

  // Row 3: Sub-headers for each student
  const row3 = ['', '']; // Date + Teacher name cols
  stuNames.forEach(() => { row3.push('Start Time', 'Duration', 'Status'); });
  row3.push(''); // Total Hours col
  ws_data.push(row3);

  // Data rows — one per day
  let grandTotal = 0;
  dayList.forEach(dateStr => {
    const d = new Date(dateStr);
    const dayName = DAYS_AR_EX[d.getDay()];
    const [yr, mo, dy] = dateStr.split('-');
    const label = dayName + ', ' + parseInt(dy) + ' ' + d.toLocaleDateString('ar-EG', {month: 'long'});
    const row = [label, '']; // Date label + empty for teacher name col

    let rowTotal = 0;
    // Each student
    stuKeys.forEach(k => {
      const sess = mySessions.find(s => s.date === dateStr && s.studentKey === k);
      if (sess) {
        const dur = durMap[sess.dur] || Math.round((sess.dur||0)*60);
        const st = statusMap[sess.status] || sess.status;
        const tm = sess.startTime || '';
        row.push(tm, dur, st);
        if (sess.status === 'present') rowTotal += (sess.dur || 0);
      } else {
        row.push('', '', '');
      }
    });

    const totalH = rowTotal > 0 ? rowTotal : 0;
    grandTotal += totalH;
    row.push(totalH > 0 ? parseFloat(totalH.toFixed(2)) : 0);
    ws_data.push(row);
  });

  // Empty row before totals
  ws_data.push(Array(row1.length).fill(''));

  // Totals row
  const totRow = ['', '']; // Date + Teacher name cols
  stuKeys.forEach(k => {
    const stuTotal = mySessions
      .filter(s => s.studentKey === k && s.status === 'present')
      .reduce((a, s) => a + (parseFloat(s.dur) || 0), 0);
    totRow.push('', parseFloat(stuTotal.toFixed(2)) || '', '');
  });
  totRow.push(parseFloat(grandTotal.toFixed(2)));
  ws_data.push(totRow);

  const ws = XLSX.utils.aoa_to_sheet(ws_data);

  // Column widths
  const cols = [{wch: 22}, {wch: 16}]; // Date + Teacher name
  stuNames.forEach(() => cols.push({wch: 12}, {wch: 10}, {wch: 16}));
  cols.push({wch: 12}); // Total Hours
  ws['!cols'] = cols;

  const month = new Date(dates[0]).toLocaleDateString('ar-EG', {month: 'long', year: 'numeric'});
  XLSX.utils.book_append_sheet(wb, ws, month);

  const fileName = 'تقرير_' + currentTeacher.name + '_' + dates[0].slice(0, 7) + '.xlsx';
  XLSX.writeFile(wb, fileName);
  showToast('✅ تم تحميل ملف Excel!');
}
