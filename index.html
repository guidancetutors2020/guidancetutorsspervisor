// ═══ EGYPT DAY HELPERS ═══
function getEgyptTodayStr() {
  const now = new Date();
  const egStr = now.toLocaleString('en-US', { timeZone: 'Africa/Cairo' });
  const egDate = new Date(egStr);
  if (egDate.getHours() < 6) egDate.setDate(egDate.getDate() - 1);
  const y = egDate.getFullYear();
  const mo = String(egDate.getMonth() + 1).padStart(2, '0');
  const d  = String(egDate.getDate()).padStart(2, '0');
  return y + '-' + mo + '-' + d;
}
function getEgyptDayName(dateStr) {
  const d = new Date(dateStr + "T12:00:00+02:00");
  return DAYS_AR[d.getDay()];
}
function isInCurrentEgyptDay(sessionDate, startTime, baseDateStr) {
  const sessionDT = new Date(sessionDate + "T" + (startTime || "00:00") + "+02:00");
  const dayStart  = new Date(baseDateStr + "T06:00:00+02:00");
  const dayEnd    = new Date(dayStart.getTime() + 24 * 60 * 60 * 1000);
  return sessionDT >= dayStart && sessionDT < dayEnd;
}
function to12Hour(time24) {
  if (!time24) return '';
  const [h, m] = time24.split(':');
  if (!h || !m) return time24;
  let hh = parseInt(h);
  const mm = String(m).padStart(2, '0');
  const ampm = hh >= 12 ? 'PM' : 'AM';
  hh = hh % 12; if (hh === 0) hh = 12;
  return hh + ':' + mm + ' ' + ampm;
}
function calcFreeSlots(sessions, workStart, workEnd) {
  workStart = workStart || "06:00"; workEnd = workEnd || "23:59";
  const byDate = {};
  sessions.forEach(s => { if (!byDate[s.date]) byDate[s.date] = []; byDate[s.date].push(s); });
  const freeSlots = [];
  Object.keys(byDate).sort().forEach(date => {
    const daySessions = byDate[date].slice().sort((a, b) => (a.startTime || '').localeCompare(b.startTime || ''));
    let currentEnd = workStart;
    daySessions.forEach(sess => {
      const sStart = sess.startTime || "00:00";
      if (sStart > currentEnd) freeSlots.push({ date, start: currentEnd, end: sStart });
      const parts = sStart.split(":"); const sh = parseInt(parts[0]); const sm = parseInt(parts[1] || 0);
      const durH = parseFloat(sess.dur) || 0.75; const totalMin = sm + durH * 60;
      const eh = sh + Math.floor(totalMin / 60); const em = Math.round(totalMin % 60);
      const sEnd = String(eh).padStart(2,'0') + ':' + String(em).padStart(2,'0');
      if (sEnd > currentEnd) currentEnd = sEnd;
    });
    if (currentEnd < workEnd) freeSlots.push({ date, start: currentEnd, end: workEnd });
  });
  return freeSlots;
}

// ═══ SCHEDULE TAB ═══
function renderScheduleTab() {
  const egyptToday = getEgyptTodayStr();
  document.getElementById('sched-today-label').textContent = getEgyptDayName(egyptToday) + ' ' + egyptToday;

  // Today's sessions
  const todaySessions = mySessions.filter(s => isInCurrentEgyptDay(s.date, s.startTime, egyptToday))
    .sort((a, b) => (a.startTime || '').localeCompare(b.startTime || ''));
  const todayEl = document.getElementById('sched-today-list');
  if (todaySessions.length === 0) {
    todayEl.innerHTML = '<div style="color:var(--gr);font-size:12px;text-align:center;padding:10px">لا توجد حصص في الفترة الحالية</div>';
  } else {
    const stC = {present:'#dcfce7',absent_paid:'#fef9c3',absent_unpaid:'#fee2e2'};
    const stT = {present:'#15803d',absent_paid:'#a16207',absent_unpaid:'#dc2626'};
    const stL = {present:'✅',absent_paid:'❌',absent_unpaid:'🚫'};
    todayEl.innerHTML = todaySessions.map(s => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px dashed var(--bd);font-size:12px">
        <span style="font-weight:700;font-size:13px">${s.studentName}</span>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="color:var(--b);font-weight:700;font-size:13px">${to12Hour(s.startTime)}</span>
          <span style="background:${stC[s.status]||'#e0e7ff'};color:${stT[s.status]||'#4338ca'};border-radius:12px;padding:2px 8px;font-size:11px;font-weight:700">${stL[s.status]||'⏳'}</span>
        </div>
      </div>`).join('');
  }

  // Weekly schedule grouped by day
  const weeklySchedule = {};
  DAYS_AR.forEach(d => { weeklySchedule[d] = []; });
  mySessions.forEach(s => {
    const dObj = new Date(s.date + "T12:00:00+02:00");
    const dn = DAYS_AR[dObj.getDay()];
    if (!weeklySchedule[dn]) weeklySchedule[dn] = [];
    const exists = weeklySchedule[dn].find(ex => ex.startTime === s.startTime && ex.studentName === s.studentName);
    if (!exists) weeklySchedule[dn].push(s);
  });
  DAYS_AR.forEach(d => weeklySchedule[d].sort((a, b) => (a.startTime || '').localeCompare(b.startTime || '')));

  const weekEl = document.getElementById('sched-weekly-list');
  const hasAny = DAYS_AR.some(d => (weeklySchedule[d] || []).length > 0);
  if (!hasAny) {
    weekEl.innerHTML = '<div style="color:var(--gr);font-size:12px;text-align:center;padding:10px">لا توجد حصص مسجلة في الجدول</div>';
  } else {
    weekEl.innerHTML = DAYS_AR.filter(d => weeklySchedule[d].length > 0).map(d => {
      const sess = weeklySchedule[d];
      return `<div style="margin-bottom:12px;background:#f8fafc;border-radius:8px;padding:8px 10px">
        <div style="font-weight:800;font-size:12px;color:var(--g);margin-bottom:6px">${d} (${sess.length} حصة)</div>
        ${sess.map((s, i) => `
          <div style="font-size:11px;padding:4px 0 4px 12px;color:var(--tx);display:flex;justify-content:space-between;border-bottom:${i < sess.length-1 ? '1px solid #e5e7eb' : 'none'}">
            <span style="font-weight:600">${s.studentName}</span>
            <span style="color:var(--b);font-weight:700">${to12Hour(s.startTime)} (${s.dur || 0.75}h)</span>
          </div>`).join('')}
      </div>`;
    }).join('');
  }

  // Free slots next 7 days
  const now = new Date();
  const next7 = [];
  for (let di = 0; di < 7; di++) {
    const dd = new Date(now.getFullYear(), now.getMonth(), now.getDate() + di);
    next7.push(dd.toISOString().slice(0, 10));
  }
  const upcoming = mySessions.filter(s => next7.includes(s.date));
  const freeSlots = calcFreeSlots(upcoming, "06:00", "23:59").filter(fs => next7.includes(fs.date));
  const freeEl = document.getElementById('sched-free-list');
  if (freeSlots.length === 0) {
    freeEl.innerHTML = '<div style="color:var(--gr);font-size:12px;text-align:center;padding:10px">لا توجد بيانات كافية أو كل الأوقات محجوزة</div>';
  } else {
    freeEl.innerHTML = freeSlots.slice(0, 30).map(slot => `
      <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed #e0c870;font-size:12px;align-items:center">
        <span style="font-weight:700;color:#7a5a0a">${slot.date} (${getEgyptDayName(slot.date)})</span>
        <span style="font-weight:900;color:var(--g);font-size:13px">${to12Hour(slot.start)} — ${to12Hour(slot.end)}</span>
      </div>`).join('');
  }

  // Students summary
  document.getElementById('sched-stu-count').textContent = myStudents.length;
  const stuEl = document.getElementById('sched-stu-list');
  if (!myStudents.length) {
    stuEl.innerHTML = '<div style="color:var(--gr);font-size:12px;text-align:center">لا يوجد طلاب مضافون</div>';
  } else {
    stuEl.innerHTML = myStudents.map(s => `
      <div style="padding:5px 0;border-bottom:1px dashed var(--bd);font-size:12px">
        <span style="font-weight:700">${s.name}</span>
        <span style="color:var(--gr);margin-right:8px">${s.program} • ${s.stateName || s.state}</span>
      </div>`).join('');
  }
}

// ═══ DAILY REPORT TAB ═══
let drCurrentType = 'present';

function setDrType(btn, type) {
  drCurrentType = type;
  document.getElementById('dr-type').value = type;
  const typeStyles = {
    present: {bg:'#dcfce7', border:'#86efac', color:'#15803d'},
    absent:  {bg:'#fee2e2', border:'#fca5a5', color:'#dc2626'},
    makeup:  {bg:'#fef9c3', border:'#fde047', color:'#a16207'},
    trial:   {bg:'#e0e7ff', border:'#a5b4fc', color:'#4338ca'},
  };
  ['present','absent','makeup','trial'].forEach(t => {
    const b = document.getElementById('dr-type-' + t);
    if (!b) return;
    if (t === type) {
      const s = typeStyles[t];
      b.style.background = s.bg;
      b.style.borderColor = s.border;
      b.style.color = s.color;
    } else {
      b.style.background = 'var(--wh)';
      b.style.borderColor = 'var(--bd)';
      b.style.color = 'var(--gr)';
    }
  });
}

function renderDailyReportTab() {
  if (!currentTeacher) return;
  document.getElementById('dreport-teacher-name').textContent = currentTeacher.name;
  document.getElementById('dr-date').value = new Date().toISOString().slice(0, 10);
  // Populate student select
  const sel = document.getElementById('dr-student');
  sel.innerHTML = '<option value="">— اختر الطالب —</option>';
  myStudents.forEach(s => {
    const o = document.createElement('option');
    o.value = s.name;
    o.textContent = s.name;
    sel.appendChild(o);
  });
}

function submitDailyReport() {
  if (!currentTeacher) return;
  const studentName = document.getElementById('dr-student').value;
  if (!studentName) { showToast('اختر الطالب أولاً'); return; }
  const report = {
    studentName,
    teacherKey: currentTeacher._key,
    teacherName: currentTeacher.name,
    type: drCurrentType,
    duration: parseInt(document.getElementById('dr-duration').value) || 45,
    date: document.getElementById('dr-date').value,
    notes: document.getElementById('dr-notes').value.trim(),
    createdAt: Date.now(),
  };
  db.ref('teachers/' + currentTeacher._key + '/dailyReports').push(report).then(() => {
    showToast('✅ تم إرسال التقرير!');
    document.getElementById('dr-student').value = '';
    document.getElementById('dr-notes').value = '';
    document.getElementById('dr-duration').value = '45';
    setDrType(document.getElementById('dr-type-present'), 'present');
  });
}
